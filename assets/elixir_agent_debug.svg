<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Hexagon fill gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#210e3d"/>
      <stop offset="60%" stop-color="#0e061c"/>
      <stop offset="100%" stop-color="#05020a"/>
    </radialGradient>

    <!-- Hexagon border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Elixir drop gradient -->
    <linearGradient id="dropGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="35%" stop-color="#a855f7"/>
      <stop offset="75%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#090514"/>
    </linearGradient>

    <!-- Core glow gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Clip path to keep interior strictly inside regular hexagon -->
  <clipPath id="hexClip">
    <polygon points="100,4 183.138,52 183.138,148 100,196 16.862,148 16.862,52"/>
  </clipPath>

  <!-- Main Hexagon Content inside Clip -->
  <g clip-path="url(#hexClip)">
    <!-- Hexagon Background -->
    <polygon points="100,4 183.138,52 183.138,148 100,196 16.862,148 16.862,52" fill="url(#bgGrad)"/>

    <!-- Subtle Tech Grid / OTP Node Network Background -->
    <g stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1">
      <line x1="100" y1="4" x2="100" y2="196"/>
      <line x1="16.862" y1="52" x2="183.138" y2="148"/>
      <line x1="16.862" y1="148" x2="183.138" y2="52"/>
    </g>

    <!-- Outer Glow halo inside hex -->
    <circle cx="100" cy="115" r="55" fill="url(#coreGlow)"/>

    <!-- Elixir Water/Fluid Drop (Sleek stylized drop) -->
    <path d="M 100,48 C 122,88 138,110 138,130 A 38,38 0 0,1 62,130 C 62,110 78,88 100,48 Z" 
          fill="url(#dropGrad)" filter="url(#softShadow)"/>

    <!-- Drop Highlight Shine (Glassmorphism effect) -->
    <path d="M 100,56 C 114,88 128,108 128,126 A 28,28 0 0,0 120,105 C 115,92 106,75 100,56 Z" 
          fill="#ffffff" opacity="0.25"/>

    <!-- Debug Bug / Agent Core Emblem Overlay -->
    <g filter="url(#neonGlow)">
      <!-- Bug Body / Chip Shield -->
      <path d="M 100,102 L 115,112 L 115,130 L 100,140 L 85,130 L 85,112 Z" 
            fill="#0f0720" stroke="url(#accentGrad)" stroke-width="2"/>
      
      <!-- Central Debug Pulse / Target Crosshair -->
      <circle cx="100" cy="121" r="7" fill="none" stroke="#38bdf8" stroke-width="1.8"/>
      <circle cx="100" cy="121" r="2.5" fill="#f472b6"/>

      <!-- Bug Legs / OTP Process Debug Cables -->
      <!-- Top legs -->
      <path d="M 85,115 L 73,110 M 115,115 L 127,110" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Mid legs -->
      <path d="M 85,121 L 70,121 M 115,121 L 130,121" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Bottom legs -->
      <path d="M 85,127 L 73,133 M 115,127 L 127,133" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round"/>

      <!-- Antennas / Agent Signal Rays -->
      <path d="M 94,102 L 87,90 M 106,102 L 113,90" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="87" cy="90" r="1.5" fill="#38bdf8"/>
      <circle cx="113" cy="90" r="1.5" fill="#38bdf8"/>
    </g>

    <!-- OTP Process Nodes (Small glowing dots around hex) -->
    <circle cx="73" cy="110" r="2" fill="#38bdf8"/>
    <circle cx="127" cy="110" r="2" fill="#38bdf8"/>
    <circle cx="70" cy="121" r="2" fill="#c084fc"/>
    <circle cx="130" cy="121" r="2" fill="#c084fc"/>
    <circle cx="73" cy="133" r="2" fill="#f472b6"/>
    <circle cx="127" cy="133" r="2" fill="#f472b6"/>

  </g>

  <!-- Hexagon Outer Border Frame -->
  <polygon points="100,4 183.138,52 183.138,148 100,196 16.862,148 16.862,52" 
           fill="none" stroke="url(#borderGrad)" stroke-width="4.5" stroke-linejoin="round" filter="url(#neonGlow)"/>
</svg>
